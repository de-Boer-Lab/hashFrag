version: 2

# Build environment
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

# Python environment
python:
  install:
    - method: pip
      path: .
    - requirements: requirements.txt

# Sphinx configuration
sphinx:
  configuration: docs/conf.py
  builder: html
  fail_on_warning: false

# Optionally, tell RTD to build using MyST (Markdown) support
formats:
  - htmlzip